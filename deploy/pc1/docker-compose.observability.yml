# Overlay leve PC1: exporters locais. Sem Prometheus/Grafana/Loki no PC1.
# Uso: docker compose -f docker-compose.yml -f docker-compose.observability.yml up -d

services:
  node-exporter:
    image: prom/node-exporter:latest
    container_name: telemedicina_node_exporter
    restart: unless-stopped
    ports:
      - '${NODE_EXPORTER_PUBLISH_PORT:-127.0.0.1:9100}:9100'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - telemedicina

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: telemedicina_cadvisor
    restart: unless-stopped
    ports:
      - '${CADVISOR_PUBLISH_PORT:-127.0.0.1:8081}:8080'
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    networks:
      - telemedicina

  promtail:
    image: grafana/promtail:3.3.3
    container_name: telemedicina_promtail
    restart: unless-stopped
    profiles:
      - promtail
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - telemedicina
