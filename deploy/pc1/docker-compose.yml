# PC1 — stack consolidada homelab: app, dados, filas, storage e Nginx.
# Uso: cd deploy/pc1 && cp .env.example .env && docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: telemedicina_postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_DATABASE:-telemedicina}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    ports:
      - '${DB_PUBLISH_PORT:-127.0.0.1:5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - telemedicina
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: telemedicina_redis
    restart: always
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '${REDIS_PUBLISH_PORT:-127.0.0.1:6379}:6379'
    volumes:
      - redis_data:/data
    networks:
      - telemedicina
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: telemedicina_rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-telemedicina}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD must be set}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    ports:
      - '${RABBITMQ_PUBLISH_PORT:-127.0.0.1:5672}:5672'
      - '${RABBITMQ_MANAGEMENT_PUBLISH_PORT:-127.0.0.1:15672}:15672'
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - telemedicina
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'check_running']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: telemedicina_minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set}
      MINIO_PROMETHEUS_AUTH_TYPE: public
    command: server /data --console-address ":9001"
    ports:
      - '${MINIO_API_PUBLISH_PORT:-127.0.0.1:9000}:9000'
      - '${MINIO_CONSOLE_PUBLISH_PORT:-127.0.0.1:9001}:9001'
    volumes:
      - ${MINIO_DATA_PATH:-/home/pc1intelceleron/minio/data}:/data
    networks:
      - telemedicina
  minio-init:
    image: minio/mc:latest
    container_name: telemedicina_minio_init
    depends_on:
      minio:
        condition: service_started
    restart: 'no'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set}
      MINIO_APP_USER: ${MINIO_APP_USER:-telemedicina-app}
      MINIO_APP_PASSWORD: ${MINIO_APP_PASSWORD:?MINIO_APP_PASSWORD must be set}
      AWS_PRIVATE_BUCKET: ${AWS_PRIVATE_BUCKET:-telemedicina-private}
      AWS_PUBLIC_BUCKET: ${AWS_PUBLIC_BUCKET:-telemedicina-public}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do sleep 2; done;
      mc mb --ignore-existing local/$${AWS_PRIVATE_BUCKET};
      mc mb --ignore-existing local/$${AWS_PUBLIC_BUCKET};
      mc anonymous set download local/$${AWS_PUBLIC_BUCKET};
      mc admin user add local $${MINIO_APP_USER} $${MINIO_APP_PASSWORD} || true;
      mc admin policy attach local readwrite --user $${MINIO_APP_USER} || true;
      "
    networks:
      - telemedicina

  app:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: telemedicina_app
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - ../..:/var/www/html
    env_file:
      - path: .env
        required: false
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      AWS_ENDPOINT: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_APP_USER:-telemedicina-app}
      AWS_SECRET_ACCESS_KEY: ${MINIO_APP_PASSWORD:?MINIO_APP_PASSWORD must be set}
      AWS_USE_PATH_STYLE_ENDPOINT: 'true'
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 8080
    command: >
      /bin/sh -lc "
      chown -R www-data:www-data storage bootstrap/cache;
      chmod -R ug+rwX storage bootstrap/cache;
      exec php-fpm
      "
    networks:
      - telemedicina

  reverb:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: telemedicina_reverb
    restart: always
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ../..:/var/www/html
    env_file:
      - path: .env
        required: false
    environment:
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 8080
      REDIS_HOST: redis
      REDIS_PORT: 6379
    command: >
      /bin/sh -lc "
      chown -R www-data:www-data storage bootstrap/cache;
      chmod -R ug+rwX storage bootstrap/cache;
      exec su-exec www-data php artisan reverb:start --host=0.0.0.0 --port=8080
      "
    expose:
      - '8080'
    networks:
      - telemedicina

  queue:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: telemedicina_queue
    restart: always
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ../..:/var/www/html
    env_file:
      - path: .env
        required: false
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
      AWS_ENDPOINT: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_APP_USER:-telemedicina-app}
      AWS_SECRET_ACCESS_KEY: ${MINIO_APP_PASSWORD:?MINIO_APP_PASSWORD must be set}
    command: >
      /bin/sh -lc "
      chown -R www-data:www-data storage bootstrap/cache;
      chmod -R ug+rwX storage bootstrap/cache;
      exec su-exec www-data php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
      "
    networks:
      - telemedicina

  queue-rabbit:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: telemedicina_queue_rabbit
    restart: always
    profiles:
      - rabbit-workers
    depends_on:
      app:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    volumes:
      - ../..:/var/www/html
    env_file:
      - path: .env
        required: false
    environment:
      DB_HOST: postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      AWS_ENDPOINT: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_APP_USER:-telemedicina-app}
      AWS_SECRET_ACCESS_KEY: ${MINIO_APP_PASSWORD:?MINIO_APP_PASSWORD must be set}
    command: >
      /bin/sh -lc "
      chown -R www-data:www-data storage bootstrap/cache;
      chmod -R ug+rwX storage bootstrap/cache;
      exec su-exec www-data php artisan queue:work rabbitmq --queue=${INTEGRATION_QUEUE_NAME:-integrations} --sleep=3 --tries=3 --max-time=3600
      "
    networks:
      - telemedicina

  scheduler:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: telemedicina_scheduler
    restart: always
    depends_on:
      app:
        condition: service_started
    volumes:
      - ../..:/var/www/html
    env_file:
      - path: .env
        required: false
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      AWS_ENDPOINT: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_APP_USER:-telemedicina-app}
      AWS_SECRET_ACCESS_KEY: ${MINIO_APP_PASSWORD:?MINIO_APP_PASSWORD must be set}
    command: >
      /bin/sh -lc "
      chown -R www-data:www-data storage bootstrap/cache;
      chmod -R ug+rwX storage bootstrap/cache;
      exec su-exec www-data php artisan schedule:work
      "
    networks:
      - telemedicina

  nginx:
    image: nginx:alpine
    container_name: telemedicina_nginx
    restart: always
    ports:
      - '${NGINX_PUBLISH_PORT:-80}:80'
    volumes:
      - ../..:/var/www/html:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      app:
        condition: service_started
      reverb:
        condition: service_started
    networks:
      - telemedicina

networks:
  telemedicina:
    name: telemedicina

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
