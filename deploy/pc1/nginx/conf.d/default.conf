limit_req_zone $binary_remote_addr zone=telemedicina_login:10m rate=10r/s;

map $http_x_forwarded_proto $telemedicina_forwarded_proto {
    default $http_x_forwarded_proto;
    "" $scheme;
}

map $telemedicina_forwarded_proto $telemedicina_https {
    default "";
    https on;
}

server {
    listen 80;
    listen [::]:80;
    server_name app.telemedicinaparatodos.com localhost _;
    resolver 127.0.0.11 valid=10s ipv6=off;
    root /var/www/html/public;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    index index.php;
    charset utf-8;
    client_max_body_size 50m;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ ^/(login|register|forgot-password|api/) {
        limit_req zone=telemedicina_login burst=20 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        set $php_upstream app:9000;
        fastcgi_pass $php_upstream;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param HTTPS $telemedicina_https if_not_empty;
        fastcgi_param HTTP_X_FORWARDED_PROTO $telemedicina_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_HOST $host;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 300;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
