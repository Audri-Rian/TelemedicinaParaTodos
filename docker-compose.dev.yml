# Compose só para ambiente de desenvolvimento local (composer run dev).
# Usa nomes de container e volumes próprios para não conflitar com outros projetos
# (ex.: outro repo telemedicina que use telemedicina_redis, etc.).

services:
  mysql:
    image: mysql:8.0
    container_name: telemedicina_paratodos_dev_mysql
    restart: always
    environment:
      MYSQL_DATABASE: telemedicina
      MYSQL_USER: telemedicina_user
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root_secret
    ports:
      - '3307:3306'
    volumes:
      - mysql_data_dev:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-proot_secret']
      interval: 10s
      timeout: 5s
      retries: 5
    command: --default-authentication-plugin=mysql_native_password

  postgres:
    image: postgres:16-alpine
    container_name: telemedicina_paratodos_dev_postgres
    restart: always
    environment:
      POSTGRES_DB: telemedicina
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - '5434:5432'
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: telemedicina_paratodos_dev_redis
    restart: always
    ports:
      - '6380:6379'
    volumes:
      - redis_data_dev:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: telemedicina_paratodos_dev_rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: telemedicina
      RABBITMQ_DEFAULT_PASS: secret
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - '5673:5672'
      - '15673:15672'
    volumes:
      - rabbitmq_data_dev:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'check_running']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: telemedicina_paratodos_dev_minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data_dev:/data
    command: server /data --console-address ":9001"

  minio-init:
    image: minio/mc:latest
    container_name: telemedicina_paratodos_dev_minio_init
    depends_on:
      - minio
    restart: 'no'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_APP_USER: ${MINIO_APP_USER:-telemedicina-app}
      MINIO_APP_PASSWORD: ${MINIO_APP_PASSWORD:-telemedicina-app-secret}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do sleep 2; done;
      mc mb --ignore-existing local/telemedicina-private;
      mc mb --ignore-existing local/telemedicina-public;
      mc anonymous set download local/telemedicina-public;
      mc admin user add local $${MINIO_APP_USER} $${MINIO_APP_PASSWORD} || true;
      mc admin policy attach local readwrite --user $${MINIO_APP_USER} || true;
      "

volumes:
  mysql_data_dev:
    driver: local
  postgres_data_dev:
    driver: local
  redis_data_dev:
    driver: local
  rabbitmq_data_dev:
    driver: local
  minio_data_dev:
    driver: local
